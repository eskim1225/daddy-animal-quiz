# GitHub Pages 자동 배포를 위한 워크플로우
name: Deploy static content to Pages

on:
  # main 브랜치에 푸시가 발생할 때 자동으로 이 워크플로우가 실행됩니다.
  push:
    branches: ['main']

# GitHub Pages 배포를 위한 필수 권한 설정
permissions:
  contents: read
  pages: write
  id-token: write

# 여러 번 연속해서 푸시할 경우 진행 중인 이전 배포를 취소하고 최신 배포만 진행하도록 하는 설정
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  # 배포 작업(job)을 정의합니다.
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest # 최신 우분투 환경에서 실행
    steps:
      - name: 저장소 소스코드 체크아웃 (가져오기)
        uses: actions/checkout@v4

      - name: Node.js 환경 설정
        uses: actions/setup-node@v4
        with:
          node-version: 24 # Node.js 24 버전 사용
          cache: 'npm'     # 의존성 설치 속도 향상을 위해 npm 캐시 사용

      - name: 패키지 의존성 설치 (npm ci)
        run: npm ci

      - name: 프로젝트 빌드 (정적 파일 생성)
        run: npm run build

      - name: GitHub Pages 환경 설정 초기화
        uses: actions/configure-pages@v4

      - name: 빌드 결과물(dist 폴더) 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          # Vite의 기본 빌드 결과물이 위치하는 'dist' 폴더를 업로드 대상으로 지정합니다.
          path: './dist'

      - name: GitHub Pages로 최종 배포
        id: deployment
        uses: actions/deploy-pages@v4
